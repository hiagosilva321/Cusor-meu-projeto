# Site estático + API — colocado em /etc/nginx/sites-available/pedircacamba
# A porta API é substituída pelo script apply-nginx.sh (lê api/.env PORT)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _ pedircacamba.com www.pedircacamba.com;

    root /var/www/pedircacamba/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:__API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
